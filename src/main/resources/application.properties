spring.application.name=oop-learning
server.port=8080

# Load ANTHROPIC_API_KEY from .env at repo root if present (gitignored),
# otherwise fall back to the process environment variable.
spring.config.import=optional:file:.env[.properties]

anthropic.api.key=${ANTHROPIC_API_KEY:}
anthropic.model=claude-haiku-4-5

server.error.include-message=always
